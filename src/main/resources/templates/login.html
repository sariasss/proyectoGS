<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Acceso | Gestión</title>
        <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.png}">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>

    <body class="flex-center-container">
        <img th:src="@{/images/logosNombre.png}" class="logo-header">

        <div class="card-form">
            <h2>Iniciar Sesión</h2>
            <form action="/login" method="post">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>

                <label for="pass">Contraseña</label>
                <input type="password" id="pass" name="password" class="form-control" required>

                <button type="submit" class="btn alta">Entrar</button>

            </form>
        </div>
    </body>
</html>
