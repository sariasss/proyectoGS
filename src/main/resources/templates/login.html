<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Gestión</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="login-page">
<!-- Fondo decorativo -->
<div class="login-background">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
</div>

<!-- Contenedor principal -->
<main class="login-wrapper">

    <!-- Panel lateral / Landing -->
    <section class="login-hero">
        <div class="hero-content">
            <img th:src="@{/images/logosNombre.png}" alt="Logo" class="hero-logo">

            <h1>Bienvenido al sistema de gestión</h1>

            <p>
                Administra usuarios, clases y procesos de forma rápida,
                intuitiva y segura.
            </p>

            <ul class="hero-features">
                <li>Gestión centralizada</li>
                <li>Interfaz moderna y elegante</li>
                <li>Acceso seguro</li>
            </ul>
        </div>
    </section>

    <!-- Tarjeta de Login -->
    <section class="login-card">
        <div class="card-form login-form-card">
            <div class="login-badge">Acceso Privado</div>

            <h2>Iniciar Sesión</h2>
            <p class="login-subtitle">
                Introduce tus credenciales para continuar.
            </p>

            <div th:if="${error}" class="login-error">
                <p th:text="${error}" class="error"></p>
            </div>

            <form th:action="@{/login}" method="post">

                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-control"
                            placeholder="usuario@correo.com"
                            required>
                </div>
                <br>
                <label for="pass">Contraseña</label>
                <div class="input-wrapper">
                    <input
                            type="password"
                            id="pass"
                            name="password"
                            class="form-control"
                            placeholder="••••••••"
                            required>
                </div>
                <br>

                <button type="submit" class="btn alta btn-login">
                    Entrar al sistema
                </button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
