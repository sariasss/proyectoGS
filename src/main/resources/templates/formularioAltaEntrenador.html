<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Usuario</title>
</head>

<body>

<h2>Nuevo Usuario</h2>

<form th:action="@{/saveUsuario}" th:object="${usuario}" method="post">
    <input type="hidden" th:field="*{id}">
    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}">
    <br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}">
    <br><br>

    <label>Password:</label>
    <input type="password" th:field="*{password}">
    <br><br>

    <label>Telefono:</label>
    <input type="text" th:field="*{telefono}">
    <br><br>

    <label>Especialidad:</label>

    <select th:field="*{especialidad}">
        <option value="">-- Selecciona especialidad --</option>

        <option th:each="esp : ${especialidades}"
                th:value="${esp}"
                th:text="${esp}">
        </option>
    </select>

    <br><br>
    <input type="hidden" th:field="*{rol}">
    <p>Rol: ENTRENADOR</p>
    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

</body>
</html>
