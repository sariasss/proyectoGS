<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="header">
    <h2><span>DeportesUGR</span> &nbsp;|&nbsp; Panel Admin</h2>
    <div class="user-info">
        <span>Bienvenido, <strong>Admin</strong></span>
        <a th:href="@{/}" class="btn-logout">Cerrar sesión</a>
    </div>
</div>

<div class="container">

    <div class="botones">
        <div>
            <a th:href="@{/newUsuario}" class="btn alta">Alta Usuario</a>
            <a th:href="@{/newEntrenador}" class="btn alta">Alta Entrenador</a>
            <a th:href="@{/newClaseTipo3}" class="btn clases">Crear Clase Tipo 3</a>
            <a th:href="@{/clases3}" class="btn clases">Ver Clases Tipo 3</a>
        </div>
    </div>

    <div class="table-container">
        <table class="styled-table">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Rol</th>
                <th>Especialidad</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.telefono}"></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.especialidad != null ? u.especialidad : 'N/A'}"></td>
                <td>
                    <div class="acciones-cell">
                        <a th:href="@{/editUsuario/{id}(id=${u.id})}" class="btn btn-sm alta">Editar</a>
                        <a th:href="@{/delUsuario/{id}(id=${u.id})}" class="btn btn-sm baja"
                           onclick="return confirm('¿Estás seguro de que quieres eliminar este usuario?')">Baja</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
