<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clase Tipo 3</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="flex-center-container">
<div class="card-form">
    <!-- El th:object debe coincidir con el nombre que pases desde el Model en el Controller -->
    <form th:action="@{/saveClaseTipo3}" th:object="${clase3}" method="post">

        <!-- CAMBIO CLAVE 1: Input oculto para el ID.
             Si es nulo, crea una clase. Si tiene valor, la edita. -->
        <input type="hidden" th:field="*{id}">

        <h2 th:text="*{id == null ? 'Nueva Clase Grupal (Tipo 3)' : 'Editar Clase Grupal (Tipo 3)'}">
            Formulario de Clase
        </h2>

        <label>Especialidad de la Clase:</label>
        <select name="especialidad" th:disabled="${clase3.especialidad != null}">
            <option value="">-- Selecciona --</option>
            <option th:each="esp : ${especialidades}"
                    th:value="${esp}"
                    th:text="${esp}"
                    th:selected="${esp == clase3.especialidad}"></option>
        </select>

        <!-- 2. CAMBIO CLAVE: Input oculto para que el valor llegue al servidor aunque el select esté disabled -->
        <input type="hidden" th:if="${clase3.especialidad != null}"
               th:field="*{especialidad}" />

        <br><br>

        <!-- 3. Solo mostramos el botón de filtrar si NO se ha elegido especialidad aún -->
        <button type="submit" th:if="${clase3.especialidad == null}"
                th:formmethod="get" th:formaction="@{/newClaseTipo3}" class="btn alta">
            Ver entrenadores disponibles
        </button>

        <div th:if="${clase3.especialidad != null}">
            <label>Fecha:</label>
            <input type="datetime-local" th:field="*{fecha}" required />

            <br><br>

            <label>Entrenador Responsable:</label>
            <select th:field="*{entrenador}" required>
                <option value="">Seleccione un entrenador...</option>
                <option th:each="e : ${entrenadores}"
                        th:value="${e.id}"
                        th:text="${e.nombre}"></option>
            </select>

            <br><br>

            <label>Cupo:</label>
            <input type="number" th:field="*{cupoMax}" />

            <br><br>
            <div class="acciones">
                <button type="submit" class="btn alta">Guardar Clase</button>
            </div>

        </div>

        <div class="acciones">
            <br><br>
            <a th:href="@{/clases3}" class="btn baja">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
