<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Clases Tipo3</title>
</head>

<body>

<h2>Listado Clases Tipo3</h2>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Nombre</th>
    </tr>

    <tr th:each="c : ${clases}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.nombre}"></td>
    </tr>

</table>

</body>
</html>
