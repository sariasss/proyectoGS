<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clase Tipo 3</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="flex-center-container">

<div class="card-form">

    <h2 th:text="${clase3.id == null ? 'Nueva Clase Grupal (Tipo 3)' : 'Editar Clase Grupal (Tipo 3)'}">
        Formulario de Clase
    </h2>

    <!-- ========================= -->
    <!-- 🔵 PASO 1: FILTRAR -->
    <!-- ========================= -->
    <div th:if="${clase3.especialidad == null}">

        <form th:action="@{/filtrarClaseTipo3}" th:object="${clase3}" method="post">

            <label>Especialidad de la Clase:</label>

            <select th:field="*{especialidad}" required>
                <option value="">-- Selecciona --</option>
                <option th:each="esp : ${especialidades}"
                        th:value="${esp}"
                        th:text="${esp}">
                </option>
            </select>

            <br><br>

            <button type="submit" class="btn alta">
                Ver entrenadores disponibles
            </button>

        </form>
    </div>

    <!-- ========================= -->
    <!-- 🔵 PASO 2: FORM COMPLETO -->
    <!-- ========================= -->
    <div th:if="${clase3.especialidad != null}">

        <form th:action="@{/saveClaseTipo3}" th:object="${clase3}" method="post">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{especialidad}">

            <label>Especialidad:</label>
            <p th:text="*{especialidad}"></p>

            <br>

            <label>Fecha:</label>
            <input type="datetime-local" th:field="*{fecha}" required />

            <br><br>

            <label>Entrenador Responsable:</label>
            <select th:field="*{entrenador}" required>
                <option value="">Seleccione un entrenador...</option>
                <option th:each="e : ${entrenadores}"
                        th:value="${e.id}"
                        th:text="${e.nombre}">
                </option>
            </select>

            <br><br>

            <label>Cupo:</label>
            <input type="number" th:field="*{cupoMax}" />

            <br><br>

            <button type="submit" class="btn alta">
                Guardar Clase
            </button>

        </form>
    </div>

    <br>

    <div class="acciones">
        <a th:href="@{/clases3}" class="btn baja">Cancelar</a>
    </div>

</div>

</body>
</html>
